<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- brand tokens -->              <link rel="stylesheet" href="card-brand.css">
<!-- sponsor-card extensions -->   <link rel="stylesheet" href="card-sponsor.css">
<style>
  /* ===== card-sponsor-square.html — LAYOUT + per-canvas font-SIZES ONLY =====
     1080×1080. Brand fonts/colors/logo treatments from card-brand.css;
     sponsor-specific treatments from card-sponsor.css. */

  html,body{ width:1080px; height:1080px; }

  .glow{ top:-520px; width:1400px; height:980px; }
  .dots{
    background-size:28px 28px;
    -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 24%, #000 0%, rgba(0,0,0,0.3) 52%, transparent 76%);
            mask-image:radial-gradient(ellipse 70% 60% at 50% 24%, #000 0%, rgba(0,0,0,0.3) 52%, transparent 76%);
  }
  .orb{ right:-400px; bottom:-400px; width:720px; height:720px; }

  .frame{ padding:84px 84px 76px; }

  /* HOST lockup */
  .hosts{ gap:18px; height:84px; }
  .host{ gap:18px; }
  .host img.orbmark{ height:82px; width:82px; }
  .host img.savant{ height:64px; }
  .host .hostname.host-mr{ font-size:42px; }
  .host .hostname.host-savant{ font-size:38px; }
  .hosts .x{ font-size:36px; margin:0 2px; }

  /* SPONSOR block */
  .body{ margin-top:auto; margin-bottom:auto; }
  .eyebrow{ font-size:24px; margin-bottom:36px; }
  .sponsor-line{ font-size:44px; line-height:1.16; max-width:820px; }
  .amount{ font-size:168px; margin:18px 0 18px; }
  .split{ font-size:33px; }
  .split .x{ font-size:32px; margin:0 16px; }

  /* FOOTER */
  .footer{ padding-top:42px; }
  .apply{ font-size:28px; padding-bottom:6px; }
  .sponsors{ gap:13px; }
  .sponsors .label{ font-size:17px; }
  .sponsors .row{ gap:32px; }
  .rerun-mark{ font-size:40px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <img class="orb" src="logos/mr-orb-masked.png" alt="">
  <div class="frame">
    <div class="hosts">
      <div class="host">
        <img class="orbmark" src="logos/mr-orb-mark-bright.png" alt="">
        <span class="hostname host-mr">Mission Robotics</span>
      </div>
      <span class="x">&times;</span>
      <div class="host">
        <img class="savant" src="logos/savant-glyph-white.png" alt="">
        <span class="hostname host-savant">savant</span>
      </div>
    </div>

    <div class="body">
      <div class="eyebrow">Sponsor Announcement</div>
      <div class="sponsor-line"><span class="name">Rerun</span> is backing<br>The Embodied Metal Hackathon</div>
      <div class="amount">$10,000</div>
      <div class="split"><b>$5K</b> to the event <span class="x">&times;</span> <b>$5K</b> to the hackers</div>
    </div>

    <div class="footer">
      <span class="apply"><span class="arrow">Apply &rarr;</span> luma.com/embodied-metal</span>
      <div class="sponsors">
        <span class="label">Sponsored by</span>
        <div class="row">
          <span class="rerun-mark">rerun</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
