<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- brand tokens -->            <link rel="stylesheet" href="card-brand.css">
<!-- judge-card extensions -->   <link rel="stylesheet" href="card-judge.css">
<style>
  /* ===== card-judge-og.html — LAYOUT + per-canvas font-SIZES ONLY =====
     1200×630. Brand fonts/colors/logo treatments come from
     card-brand.css; judge-specific treatments from card-judge.css. */

  html,body{ width:1200px; height:630px; }

  .glow{ top:-420px; width:1300px; height:840px; }
  .dots{
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
            mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
  }
  .orb{ right:-380px; bottom:-360px; width:640px; height:640px; }

  .frame{ padding:48px 56px 44px; }

  /* HOST lockup */
  .hosts{ gap:13px; height:62px; }
  .host{ gap:13px; }
  .host img.orbmark{ height:60px; width:60px; }
  .host img.savant{ height:48px; }
  .host .hostname.host-mr{ font-size:30px; }
  .host .hostname.host-savant{ font-size:27px; }
  .hosts .x{ font-size:26px; margin:0 1px; }

  /* JUDGE block — eyebrow, then headshot + name/title, then the event line */
  .body{ margin-top:auto; margin-bottom:auto; }
  .eyebrow{ font-size:18px; margin-bottom:22px; }

  .judge-row{ gap:34px; }
  .headshot{ width:168px; height:168px; }
  .headshot.placeholder{ font-size:13px; line-height:1.3; padding:10px; }

  .judge-name{ font-size:74px; }
  .judge-title{ font-size:22px; margin-top:12px; max-width:560px; line-height:1.3; }

  .judge-line{ font-size:34px; margin-top:30px; }

  /* FOOTER */
  .footer{ padding-top:26px; }
  .apply{ font-size:22px; padding-bottom:4px; }
  .sponsors{ gap:9px; }
  .sponsors .label{ font-size:13px; }
  .sponsors .row{ gap:26px; }
  .sponsors img.modal{ height:24px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <img class="orb" src="logos/mr-orb-masked.png" alt="">
  <div class="frame">
    <div class="hosts">
      <div class="host">
        <img class="orbmark" src="logos/mr-orb-mark-bright.png" alt="">
        <span class="hostname host-mr">Mission Robotics</span>
      </div>
      <span class="x">&times;</span>
      <div class="host">
        <img class="savant" src="logos/savant-glyph-white.png" alt="">
        <span class="hostname host-savant">savant</span>
      </div>
    </div>

    <div class="body">
      <div class="eyebrow">Judge Announcement</div>
      <div class="judge-row">

        <!-- HEADSHOT SLOT: swap the placeholder div for
             <img class="headshot" src="logos/judge-NAME.png" alt=""> when you have one. -->
        <div class="headshot placeholder" style="width:168px;height:168px;">Headshot<br>TBD</div>

        <div class="judge-text">
          <!-- JUDGE NAME -->
          <div class="judge-name">Judge Name</div>
          <!-- JUDGE TITLE / AFFILIATION -->
          <div class="judge-title">[TITLE TBD]</div>
        </div>
      </div>

      <div class="judge-line">is judging <span class="event">The Embodied Metal Hackathon</span> &middot; July 17–19</div>
    </div>

    <div class="footer">
      <span class="apply"><span class="arrow">Apply &rarr;</span> luma.com/embodied-metal</span>
      <div class="sponsors">
        <span class="label">The Embodied Metal Hackathon</span>
      </div>
    </div>
  </div>
</body>
</html>
