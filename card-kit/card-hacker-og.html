<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- brand tokens -->            <link rel="stylesheet" href="card-brand.css">
<!-- hacker-card extensions -->  <link rel="stylesheet" href="card-hacker.css">
<style>
  /* ===== card-hacker-og.html — LAYOUT + per-canvas font-SIZES ONLY =====
     1200×630. Brand fonts/colors/logo treatments come from
     card-brand.css; hacker-specific treatments from card-hacker.css. */

  html,body{ width:1200px; height:630px; }

  .glow{ top:-420px; width:1300px; height:840px; }
  .dots{
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
            mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
  }
  .orb{ right:-260px; bottom:-300px; width:720px; height:720px; opacity:0.32; }

  .frame{ padding:48px 56px 44px; }

  /* HOST lockup */
  .hosts{ gap:13px; height:62px; }
  .host{ gap:13px; }
  .host img.orbmark{ height:60px; width:60px; }
  .host img.savant{ height:48px; }
  .host .hostname.host-mr{ font-size:30px; }
  .host .hostname.host-savant{ font-size:27px; }
  .hosts .x{ font-size:26px; margin:0 1px; }

  /* HACKER block — eyebrow, then the big "I'm hacking …" line, then date */
  .body{ margin-top:auto; margin-bottom:auto; }
  .eyebrow{ font-size:18px; margin-bottom:24px; }

  .hacker-line{ font-size:66px; max-width:1060px; }
  .hacker-line .event{ font-size:62px; }
  .hacker-when{ font-size:34px; margin-top:26px; }
  .tagline{ font-size:34px; margin-top:20px; line-height:1.0; }

  /* FOOTER */
  .footer{ padding-top:26px; }
  .apply{ font-size:22px; padding-bottom:4px; }
  .sponsors{ gap:9px; }
  /* hacker footer: tag in mint, normal case — not the dim tracked sponsor label */
  .sponsors .hashtag{ font-family:'Inter',sans-serif; font-weight:600;
    letter-spacing:0.01em; text-transform:none; color:var(--mint); font-size:18px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <img class="orb" src="logos/mr-orb-masked.png" alt="">
  <div class="frame">
    <div class="hosts">
      <div class="host">
        <img class="orbmark" src="logos/mr-orb-mark-bright.png" alt="">
        <span class="hostname host-mr">Mission Robotics</span>
      </div>
      <span class="x">&times;</span>
      <div class="host">
        <img class="savant" src="logos/savant-glyph-white.png" alt="">
        <span class="hostname host-savant">savant</span>
      </div>
    </div>

    <div class="body">
      <div class="eyebrow">&#10003;&ensp;Accepted</div>
      <!-- HACKER LINE: "I'm hacking" (generic) or "[NAME] is hacking" (named) -->
      <div class="hacker-line">I'm hacking <span class="event">The Embodied Metal Hackathon</span></div>
      <div class="hacker-when">July 17–19 &middot; San Francisco</div>
      <div class="tagline">Put a mind in the metal.</div>
    </div>

    <div class="footer">
      <span class="apply"><span class="arrow">Build with us &rarr;</span> luma.com/embodied-metal</span>
      <div class="sponsors">
        <span class="hashtag">#EmbodiedMetal</span>
      </div>
    </div>
  </div>
</body>
</html>
