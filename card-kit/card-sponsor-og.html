<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- brand tokens -->              <link rel="stylesheet" href="card-brand.css">
<!-- sponsor-card extensions -->   <link rel="stylesheet" href="card-sponsor.css">
<style>
  /* ===== card-sponsor-og.html — LAYOUT + per-canvas font-SIZES ONLY =====
     1200×630. Brand fonts/colors/logo treatments from card-brand.css;
     sponsor-specific treatments from card-sponsor.css. */

  html,body{ width:1200px; height:630px; }

  .glow{ top:-420px; width:1300px; height:840px; }
  .dots{
    background-size:26px 26px;
    -webkit-mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
            mask-image:radial-gradient(ellipse 65% 70% at 52% 22%, #000 0%, rgba(0,0,0,0.3) 50%, transparent 75%);
  }
  .orb{ right:-380px; bottom:-360px; width:640px; height:640px; }

  .frame{ padding:48px 56px 44px; }

  /* HOST lockup */
  .hosts{ gap:13px; height:62px; }
  .host{ gap:13px; }
  .host img.orbmark{ height:60px; width:60px; }
  .host img.savant{ height:48px; }
  .host .hostname.host-mr{ font-size:30px; }
  .host .hostname.host-savant{ font-size:27px; }
  .hosts .x{ font-size:26px; margin:0 1px; }

  /* SPONSOR block */
  .body{ margin-top:auto; margin-bottom:auto; }
  .eyebrow{ font-size:18px; margin-bottom:18px; }
  .sponsor-line{ font-size:34px; }
  .amount{ font-size:120px; margin:8px 0 6px; }
  .split{ font-size:25px; }
  .split .x{ font-size:24px; margin:0 12px; }

  /* FOOTER */
  .footer{ padding-top:26px; }
  .apply{ font-size:22px; padding-bottom:4px; }
  .sponsors{ gap:9px; }
  .sponsors .label{ font-size:13px; }
  .sponsors .row{ gap:26px; }
  .rerun-mark{ font-size:30px; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="dots"></div>
  <img class="orb" src="logos/mr-orb-masked.png" alt="">
  <div class="frame">
    <div class="hosts">
      <div class="host">
        <img class="orbmark" src="logos/mr-orb-mark-bright.png" alt="">
        <span class="hostname host-mr">Mission Robotics</span>
      </div>
      <span class="x">&times;</span>
      <div class="host">
        <img class="savant" src="logos/savant-glyph-white.png" alt="">
        <span class="hostname host-savant">savant</span>
      </div>
    </div>

    <div class="body">
      <div class="eyebrow">Sponsor Announcement</div>
      <div class="sponsor-line"><span class="name">Rerun</span> is backing The Embodied Metal Hackathon</div>
      <div class="amount">$10,000</div>
      <div class="split"><b>$5K</b> to the event <span class="x">&times;</span> <b>$5K</b> to the hackers</div>
    </div>

    <div class="footer">
      <span class="apply"><span class="arrow">Apply &rarr;</span> luma.com/embodied-metal</span>
      <div class="sponsors">
        <span class="label">Sponsored by</span>
        <div class="row">
          <span class="rerun-mark">rerun</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
